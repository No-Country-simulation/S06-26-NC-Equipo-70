name: geoanalytics-stack
networks:
  geo_net:
    driver: bridge
services:
  backend:
    container_name: back-geoanalytics
    image: geoanalytics-api:latest
    build: ./back
    mem_limit: 512m
    networks:
      - geo_net
    ports:
      - "8080:8080"
    env_file:
      - ./back/.env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:9090/actuator/health/liveness" ]
      start_period: 60s
      start_interval: 10s
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      postgres_db:
        condition: service_healthy

  postgres_db:
    container_name: postgres
    image: postgres:18-alpine
    mem_limit: 256m
    networks:
      - geo_net
    env_file:
      - ./back/db.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

  frontend:
    container_name: front-geoanalytics
    image: geoanalytics-frontend:latest
    build: ./front
    mem_limit: 256m
    networks:
      - geo_net
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/ || exit 1"]
      start_period: 30s
      start_interval: 5s
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data: