name: geoanalytics-stack

networks:
  geo_net:
    driver: bridge

services:
  postgres:
    container_name: postgres
    image: postgres:18-alpine
    mem_limit: 256m
    networks:
      - geo_net
    env_file:
      - ./back/db.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql

  storage-server:
    image: minio/minio:latest
    container_name: storage-minio
    mem_limit: 512m
    networks:
      - geo_net
    env_file:
      - ./back/.env
    entrypoint:
      - /bin/sh
      - -c
      - |
        export MINIO_ROOT_USER="$$APPBIT_STORAGE_R2_ACCESS_KEY_ID"
        export MINIO_ROOT_PASSWORD="$$APPBIT_STORAGE_R2_SECRET_ACCESS_KEY"
        exec minio server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - storage_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  storage-init:
    image: minio/mc:latest
    container_name: storage-init
    mem_limit: 128m
    networks:
      - geo_net
    depends_on:
      storage-server:
        condition: service_healthy
    env_file:
      - ./back/.env
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set storage-local http://storage-server:9000 "$${APPBIT_STORAGE_R2_ACCESS_KEY_ID}" "$${APPBIT_STORAGE_R2_SECRET_ACCESS_KEY}"
        mc mb --ignore-existing "storage-local/$${APPBIT_STORAGE_R2_BUCKET_NAME}"
        touch /tmp/.keep
        mc cp /tmp/.keep "storage-local/$${APPBIT_STORAGE_R2_BUCKET_NAME}/raw/visent-cdrview/.keep"
    restart: "no"

  backend:
    container_name: back-geoanalytics
    image: geoanalytics-api:latest
    build: ./back
    pull_policy: build
    mem_limit: 512m
    networks:
      - geo_net
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    env_file:
      - ./back/.env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:9090/actuator/health/liveness" ]
      start_period: 60s
      start_interval: 10s
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully

  frontend:
    container_name: front-geoanalytics
    image: geoanalytics-frontend:latest
    build: ./front
    pull_policy: build
    mem_limit: 256m
    networks:
      - geo_net
    ports:
      - "80:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/ || exit 1"]
      start_period: 30s
      start_interval: 5s
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  storage_data:
    name: geoanalytics-storage-data