spring:
  datasource:
    url: jdbc:h2:mem:geoanalytics_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never
  ai:
    model:
      chat: none
    chat:
      client:
        enabled: false
  flyway:
    enabled: false
  docker:
    compose:
      enabled: false