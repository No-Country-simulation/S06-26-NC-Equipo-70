spring:
  application:
    name: geo-analytics-api
  profiles:
    default: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
    locations: classpath:db/migration
  ai:
    google:
      genai:
        api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY}
        chat:
          model: ${SPRING_AI_GOOGLE_GENAI_CHAT_MODEL:gemini-3.1-flash-lite}
  web:
    error:
      include-stacktrace: never
      include-message: never
      include-exception: false
      include-binding-errors: never

server:
  port: ${SERVER_PORT:8080}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9090}
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

monitor:
  token: ${KEEP_ALIVE_TOKEN}