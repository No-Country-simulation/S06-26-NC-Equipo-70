name: back-ci-cd

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "back/**"
      - ".github/workflows/back-ci-cd.yml"

  push:
    branches:
      - main
    paths:
      - "back/**"
      - ".github/workflows/back-ci-cd.yml"

  workflow_dispatch:

concurrency:
  group: back-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run Maven verify
        run: |
          if [ -x ./mvnw ]; then
            ./mvnw -B -ntp clean verify
          else
            mvn -B -ntp clean verify
          fi

  backend-cd:
    name: Backend CD Production
    runs-on: ubuntu-latest

    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')

    env:
      BACK_RENDER_DEPLOY_HOOK_URL: ${{ secrets.BACK_RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Validate Render deploy hook
        run: |
          if [ -z "$BACK_RENDER_DEPLOY_HOOK_URL" ]; then
            echo "BACK_RENDER_DEPLOY_HOOK_URL is not configured."
            exit 1
          fi

      - name: Trigger backend deploy on Render
        run: |
          if [[ "$BACK_RENDER_DEPLOY_HOOK_URL" == *\?* ]]; then
            SEPARATOR="&"
          else
            SEPARATOR="?"
          fi

          curl -fsS -X POST "${BACK_RENDER_DEPLOY_HOOK_URL}${SEPARATOR}ref=${GITHUB_SHA}"